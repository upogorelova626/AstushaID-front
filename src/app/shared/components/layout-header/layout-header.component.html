<header class="app-header">
    <div class="app-header__left">
        <span class="app-header__eyebrow"> Aккаунт Astusha </span>

        <h1 class="app-header__title"> Единый аккаунт для сервисов Astusha </h1>
    </div>

    <div class="app-header__right" [tuiSkeleton]="isLoading()">
        <button
            tuiButton
            class="app-header__notification"
            type="button"
            appearance="flat"
            size="m"
            iconStart="@tui.bell"
            aria-label="Уведомления"
        ></button>

        @let user = currentUser$ | async;

        <button
            tuiButton
            class="app-header__profile"
            type="button"
            appearance="flat"
            size="m"
        >
            @if (user?.avatarUrl) {
                <img
                    class="app-header__avatar"
                    [src]="user?.avatarUrl"
                    alt="Фото профиля"
                />
            } @else {
                <div class="app-header__avatar" tuiAvatar="@tui.user"> </div>
            }

            <div class="app-header__user-info">
                <span class="app-header__user-name">
                    {{ user?.firstName || user?.login }}
                </span>

                <span class="app-header__user-login">
                    {{ user?.email }}
                </span>
            </div>

            <tui-icon class="app-header__chevron" icon="@tui.chevron-down" />
        </button>
    </div>
</header>
