<div class="two-factor-auth-card">
    <header class="two-factor-auth-card__header">
        <div tuiAvatar="@tui.shield-check" size="l" appearance="warning"></div>

        <div class="two-factor-auth-card__info">
            <h2 class="two-factor-auth-card__title">
                Двухфакторная аутентификация
            </h2>

            <p class="two-factor-auth-card__description">
                Добавьте дополнительный уровень защиты для вашего аккаунта.
            </p>
        </div>
    </header>

    <main class="two-factor-auth-card__content">
        <section class="two-factor-auth-card__status">
            <div
                tuiAvatar="@tui.lock-keyhole"
                size="m"
                appearance="positive"
            ></div>

            <div
                class="two-factor-auth-card__status-info"
                [tuiSkeleton]="isLoading()"
            >
                @if (isTwoFactorEnabled()) {
                    <div class="two-factor-auth-card__status-title">
                        2FA включена
                    </div>
                } @else {
                    <div class="two-factor-auth-card__status-title">
                        2FA выключена
                    </div>
                }

                <div class="two-factor-auth-card__status-description">
                    Ваш аккаунт защищён дополнительным уровнем безопасности.
                </div>
            </div>

            <input
                tuiSwitch
                type="checkbox"
                [formControl]="control"
                [tuiSkeleton]="isLoading()"
                (change)="toggleTwoFactor()"
            />
        </section>
    </main>
</div>
