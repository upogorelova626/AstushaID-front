<div class="card">
    <header class="header">
        <div tuiAvatar="@tui.trash-2" size="l" appearance="negative"></div>

        <div class="info">
            <div class="title-row">
                <div class="title">Удаление аккаунта</div>

                <span tuiBadge appearance="negative">Опасная зона</span>
            </div>

            <div class="description">
                Удаление аккаунта необратимо. Все ваши данные, проекты, задачи и
                настройки будут удалены навсегда.
            </div>
        </div>
    </header>

    <main class="content">
        <div class="danger-list">
            <ul tuiList>
                <li>Все проекты, задачи и файлы</li>
                <li>Интеграции и подключения</li>
                <li>Справочники</li>
                <li>Все сообщения в AstushaMessage</li>
            </ul>
        </div>
    </main>

    <button
        tuiButton
        type="button"
        appearance="accent"
        iconStart="@tui.trash-2"
        class="button"
        (click)="openDeleteProfileNotificationDialog()"
    >
        Удалить аккаунт
    </button>
</div>
