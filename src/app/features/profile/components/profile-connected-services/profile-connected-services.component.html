<div class="profile-connected-services">
    <header class="profile-connected-services__header">
        <h2 class="profile-connected-services__title">
            Подключённые сервисы Astusha
        </h2>
    </header>

    <div class="profile-connected-services__items">
        <a class="profile-connected-services__item" routerLink="/account/apps">
            <div class="profile-connected-services__icon">
                <tui-icon icon="@tui.kanban" />
            </div>

            <div class="profile-connected-services__content">
                <div class="profile-connected-services__top">
                    <div class="profile-connected-services__main">
                        <p class="profile-connected-services__name">
                            AstushaApp
                        </p>

                        <p class="profile-connected-services__description">
                            Проекты, задачи, команды и спринты
                        </p>
                    </div>

                    <span class="profile-connected-services__status">
                        Активен
                    </span>
                </div>

                <div class="profile-connected-services__bottom">
                    <div class="profile-connected-services__meta">
                        <span class="profile-connected-services__meta-label">
                            Последний вход
                        </span>

                        <span class="profile-connected-services__meta-value">
                            Сегодня, 14:32
                        </span>
                    </div>

                    <tui-icon
                        class="profile-connected-services__chevron"
                        icon="@tui.chevron-right"
                    />
                </div>
            </div>
        </a>

        <a class="profile-connected-services__item" routerLink="/account/apps">
            <div class="profile-connected-services__icon">
                <tui-icon icon="@tui.book-open" />
            </div>

            <div class="profile-connected-services__content">
                <div class="profile-connected-services__top">
                    <div class="profile-connected-services__main">
                        <p class="profile-connected-services__name">
                            AstushaBook
                        </p>

                        <p class="profile-connected-services__description">
                            Хэндбуки, документация и база знаний
                        </p>
                    </div>

                    <span class="profile-connected-services__status">
                        Активен
                    </span>
                </div>

                <div class="profile-connected-services__bottom">
                    <div class="profile-connected-services__meta">
                        <span class="profile-connected-services__meta-label">
                            Последний вход
                        </span>

                        <span class="profile-connected-services__meta-value">
                            Вчера, 21:15
                        </span>
                    </div>

                    <tui-icon
                        class="profile-connected-services__chevron"
                        icon="@tui.chevron-right"
                    />
                </div>
            </div>
        </a>

        <div class="profile-connected-services__item">
            <div class="profile-connected-services__icon">
                <tui-icon icon="@tui.message-circle" />
            </div>

            <div class="profile-connected-services__content">
                <div class="profile-connected-services__top">
                    <div class="profile-connected-services__main">
                        <p class="profile-connected-services__name">
                            AstushaChat
                        </p>

                        <p class="profile-connected-services__description">
                            Командное общение и обсуждения проектов
                        </p>
                    </div>

                    <span
                        class="profile-connected-services__status profile-connected-services__status_soon"
                    >
                        Скоро
                    </span>
                </div>

                <div class="profile-connected-services__bottom">
                    <div class="profile-connected-services__meta">
                        <span class="profile-connected-services__meta-label">
                            Статус
                        </span>

                        <span class="profile-connected-services__meta-value">
                            В разработке
                        </span>
                    </div>

                    <tui-icon
                        class="profile-connected-services__chevron"
                        icon="@tui.chevron-right"
                    />
                </div>
            </div>
        </div>
    </div>
</div>
