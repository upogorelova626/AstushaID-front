<div class="create-account-form__wrapper">
    <header class="create-account-form__header">
        <h1 class="create-account-form__header-title">Создайте аккаунт</h1>

        <p class="create-account-form__header-subtitle">
            Зарегистрируйтесь, чтобы использовать все сервисы Astusha
        </p>
    </header>

    <main class="create-account-form__content">
        <form class="create-account-form__form">
            <tui-textfield iconStart="@tui.user">
                <label class="create-account-form__field-label" tuiLabel>
                    Логин
                </label>

                <input
                    tuiInput
                    type="text"
                    autocomplete="username"
                    placeholder="Введите логин"
                />
            </tui-textfield>

            <tui-textfield iconStart="@tui.mail">
                <label class="create-account-form__field-label" tuiLabel>
                    Email
                </label>

                <input
                    tuiInput
                    type="email"
                    autocomplete="email"
                    placeholder="Введите email"
                />
            </tui-textfield>

            <tui-textfield iconStart="@tui.lock-keyhole">
                <label class="create-account-form__field-label" tuiLabel>
                    Пароль
                </label>

                <input
                    tuiInput
                    type="password"
                    autocomplete="new-password"
                    placeholder="Введите пароль"
                />
            </tui-textfield>

            <tui-textfield iconStart="@tui.lock-keyhole">
                <label class="create-account-form__field-label" tuiLabel>
                    Подтвердите пароль
                </label>

                <input
                    tuiInput
                    type="password"
                    autocomplete="new-password"
                    placeholder="Повторите пароль"
                />
            </tui-textfield>

            <label class="create-account-form__agreement">
                <input tuiCheckbox type="checkbox" size="m" />

                <span class="create-account-form__agreement-text">
                    Я принимаю условия использования и политику
                    конфиденциальности
                </span>
            </label>

            <button
                tuiButton
                class="create-account-form__submit"
                type="submit"
                size="l"
            >
                Создать аккаунт
            </button>
        </form>
    </main>

    <footer class="create-account-form__footer">
        <div class="create-account-form__divider">
            <span class="create-account-form__divider-line"></span>

            <p class="create-account-form__divider-text">или</p>

            <span class="create-account-form__divider-line"></span>
        </div>

        <button
            tuiButton
            class="create-account-form__google"
            type="button"
            appearance="outline"
            size="l"
        >
            Создать аккаунт через Google
        </button>

        <div class="create-account-form__login">
            <span class="create-account-form__login-text">
                Уже есть аккаунт?
            </span>

            <a
                tuiLink
                class="create-account-form__login-link"
                [routerLink]="['/auth', '/login']"
            >
                Войти
            </a>
        </div>
    </footer>
</div>
