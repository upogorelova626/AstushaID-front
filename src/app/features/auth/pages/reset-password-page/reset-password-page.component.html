<div class="reset-password-page__wrapper">
    <header class="reset-password-page__header">
        <h1 class="reset-password-page__header-title">
            Установите новый пароль
        </h1>

        <p class="reset-password-page__header-subtitle">
            Придумайте новый пароль для входа в аккаунт Astusha ID.
        </p>
    </header>

    <main class="reset-password-page__content">
        <form
            class="reset-password-page__form"
            [formGroup]="resetPasswordForm"
            (ngSubmit)="resetPassword()"
        >
            <tui-textfield iconStart="@tui.lock-keyhole">
                <label class="reset-password-page__field-label" tuiLabel>
                    Новый пароль
                </label>

                <input
                    tuiInput
                    type="password"
                    autocomplete="new-password"
                    placeholder="Введите новый пароль"
                    formControlName="newPassword"
                />

                <tui-icon tuiPassword />
            </tui-textfield>
            <tui-error
                formControlName="newPassword"
                [order]="['required', 'minlength', 'maxlength']"
            />

            <tui-textfield iconStart="@tui.lock-keyhole">
                <label class="reset-password-page__field-label" tuiLabel>
                    Подтвердите пароль
                </label>

                <input
                    tuiInput
                    type="password"
                    autocomplete="new-password"
                    placeholder="Повторите новый пароль"
                    formControlName="confirmPassword"
                />

                <tui-icon tuiPassword />
            </tui-textfield>
            <tui-error
                formControlName="confirmPassword"
                [order]="[
                    'required',
                    'minlength',
                    'maxlength',
                    'passwordMismatch'
                ]"
            />

            <button
                tuiButton
                class="reset-password-page__submit"
                type="submit"
                size="l"
                [disabled]="isLoading()"
            >
                Сохранить новый пароль
            </button>
        </form>
    </main>

    <footer class="reset-password-page__footer">
        <div class="reset-password-page__login">
            <span class="reset-password-page__login-text">
                Вспомнили пароль?
            </span>

            <a
                tuiLink
                class="reset-password-page__login-link"
                [routerLink]="['/auth/login']"
            >
                Войти
            </a>
        </div>
    </footer>
</div>
