<div class="card">
    <header class="header">
        <div tuiAvatar="@tui.mail" appearance="info" size="l"></div>

        <div class="header-content">
            <h2 class="title">Email</h2>

            <p class="description">
                Ваш email используется для входа в аккаунт и получения
                уведомлений.
            </p>
        </div>
    </header>

    <div class="content">
        <tui-textfield>
            <label tuiLabel for="email">Email</label>

            <input
                id="email"
                autocomplete="email"
                tuiInput
                disabled
                [value]="currentUser()?.email"
                placeholder="example@mail.com"
            />
        </tui-textfield>

        <div class="notice">
            <tui-icon class="notice-icon" icon="@tui.circle-alert" />

            <div class="notice-content">
                <div class="notice-title">
                    Изменение email пока недоступно
                </div>

                <div class="notice-text">
                    Позже здесь появится подтверждение email и смена адреса
                    через письмо.
                </div>
            </div>
        </div>
    </div>
</div>
